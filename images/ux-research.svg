<style type="text/css"><![CDATA[
@media (prefers-reduced-motion: reduce) {
  .ux-ill-browser, .ux-ill-crop, .ux-ill-search { animation: none !important; }
}
@keyframes ux-anim-browser {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(0, -8px); }
}
@keyframes ux-anim-crop {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(6px, -7px); }
}
@keyframes ux-anim-search {
  0%, 100% { transform: translate(0, 0); }
  25% { transform: translate(6px, -7px); }
  50% { transform: translate(0, -10px); }
  75% { transform: translate(-7px, -5px); }
}
.ux-ill-browser {
  animation: ux-anim-browser 5.5s ease-in-out infinite;
  transform-box: fill-box;
  transform-origin: 55% 45%;
}
.ux-ill-crop {
  animation: ux-anim-crop 6s ease-in-out infinite;
  animation-delay: -0.9s;
  transform-box: fill-box;
  transform-origin: 30% 85%;
}
.ux-ill-search {
  animation: ux-anim-search 6.8s ease-in-out infinite;
  animation-delay: -2.2s;
  transform-box: fill-box;
  transform-origin: 85% 55%;
}
]]></style>

